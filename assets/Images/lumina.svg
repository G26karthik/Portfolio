<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Lumina Project Cover</title>
  <desc id="desc">Abstract search-themed gradients and layered circles for Lumina project card.</desc>
  <defs>
    <radialGradient id="r1" cx="20%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#88c2ff"/>
      <stop offset="45%" stop-color="#2D6CDF"/>
      <stop offset="100%" stop-color="#0f1a33"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="720" fill="#0d1428"/>
  <rect x="0" y="0" width="1200" height="720" fill="url(#r1)" opacity="0.95"/>
  <g fill="none" stroke="#dbeeff" stroke-width="3" opacity="0.55">
    <circle cx="860" cy="260" r="165"/>
    <circle cx="860" cy="260" r="115"/>
    <circle cx="860" cy="260" r="70"/>
    <path d="M960 360 L1070 470" stroke-linecap="round"/>
  </g>
  <rect x="90" y="520" width="1020" height="140" rx="24" fill="rgba(0,0,0,0.38)"/>
  <text x="130" y="592" fill="#ffffff" font-size="68" font-family="Poppins,Segoe UI,sans-serif" font-weight="700">Lumina</text>
  <text x="130" y="635" fill="#d9ecff" font-size="31" font-family="Poppins,Segoe UI,sans-serif">Hybrid RAG Search Engine &amp; Caching Layer</text>
