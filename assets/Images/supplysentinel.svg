  <text x="120" y="592" fill="#ffffff" font-size="62" font-family="Poppins,Segoe UI,sans-serif" font-weight="700">SupplySentinel</text>
  <text x="120" y="635" fill="#cde6ff" font-size="30" font-family="Poppins,Segoe UI,sans-serif">Autonomous Multi-Agent Supply Chain Risk System</text>
