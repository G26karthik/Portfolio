<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">SupplySentinel Project Cover</title>
  <desc id="desc">Blue-black geometric gradient with network nodes and a title label.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1222"/>
      <stop offset="60%" stop-color="#122b52"/>
      <stop offset="100%" stop-color="#1f4f96"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7AB6FF"/>
