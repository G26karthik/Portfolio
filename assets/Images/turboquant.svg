<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">TurboQuant Project Cover</title>
  <desc id="desc">Tech dashboard inspired cover with bars and compression percentages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#131f3a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FA3FF"/>
      <stop offset="100%" stop-color="#7fd2ff"/>
