  <text x="680" y="208" fill="#b8dcff" font-size="26" font-family="Poppins,Segoe UI,sans-serif">KV Compression 3.3x</text>
  <text x="680" y="268" fill="#b8dcff" font-size="26" font-family="Poppins,Segoe UI,sans-serif">Perplexity +6.1%</text>
